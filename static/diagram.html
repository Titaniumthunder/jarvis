<!DOCTYPE html>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #07090f;

    flex-direction: column;
    align-items: center;
    padding: 32px 24px 48px;
    font-family: 'Rajdhani', sans-serif;
    color: #c8d6e5;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,0.012) 2px, rgba(0,212,255,0.012) 4px);
    pointer-events: none; z-index: 999;
  }
  h1 {
    font-size: 26px; font-weight: 700; letter-spacing: 6px;
    color: #00d4ff; text-transform: uppercase; margin-bottom: 4px;
  }
  .sub {
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    letter-spacing: 3px; color: #4a5568; margin-bottom: 36px;
  }
  svg { overflow: visible; }
</style>
</head>
